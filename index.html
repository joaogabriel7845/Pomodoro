<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro - Dogcore</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap');
    </style>
</head>
<body>

    <header>
        <h1>Pomodoro</h1>
        <p>Foque por 25 minutos. Descanse por 5. Repita.</p>
    </header>

    <div class="cardPomo">
        <h1 id="timer"></h1>
        <p>Modo:</p>
        <div class="mode">
            <button id="focusBtn"><i class="fa-solid fa-circle"></i> Foco</button>
            <button id="sleepBtn">Descanso</button>
        </div>
        <div class="btnPomo">
            <button id="startBtn"><i class="fa-solid fa-play"></i></button>
            <button id="pauseBtn"><i class="fa-solid fa-pause"></i></button>
            <button id="resetBtn"><i class="fa-solid fa-rotate-left"></i></button>
        </div>

        <div class="capybara">
            <img src="assets/images/capybaraSleep.jpg" alt="">
        </div>

    </div>

    
    <script src="script.js"></script>
</body>
</html>
